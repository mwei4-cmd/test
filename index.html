<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCB Nesting Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--bg2:#141720;--bg3:#1a1f2e;--bg4:#1e2030;
  --border:#2a2f45;--border2:#3d4466;
  --text:#c0caf5;--text2:#a9b1d6;--text3:#6b7599;--text4:#565f89;
  --blue:#7aa2f7;--blue2:#3d59a1;--teal:#2ac3de;
  --orange:#ff9e64;--yellow:#e0af68;--green:#9ece6a;--green2:#1a6b3a;
  --red:#f7768e;--pink:#ff007c;
  --mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;600&display=swap');

/* ── Layout ── */
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:44px;display:flex;align-items:center;gap:16px;flex-shrink:0}
#topbar h1{font-size:15px;font-weight:600;color:var(--blue);letter-spacing:0.05em}
#tabs{display:flex;gap:2px;margin-left:auto}
.tab-btn{background:transparent;border:none;color:var(--text3);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.tab-btn.active{background:var(--bg3);color:var(--text);font-weight:600}
.tab-btn:hover:not(.active){color:var(--text2)}

#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:12px;flex-shrink:0}
#content{flex:1;overflow:hidden;display:flex;flex-direction:column}

.panel{display:none;flex:1;overflow:hidden}
.panel.active{display:flex;flex-direction:column}

/* ── Sidebar ── */
.sec-label{font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:10px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.field-single{margin-bottom:8px}
label{display:block;font-size:11px;color:var(--text3);margin-bottom:3px}
input[type=number],select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none}
input[type=number]:focus,select:focus{border-color:var(--blue2)}
input[type=range]{width:100%;accent-color:var(--blue)}
.range-val{font-size:12px;color:var(--blue);font-family:var(--mono);text-align:right}

.btn{width:100%;padding:9px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;margin-bottom:6px}
.btn-primary{background:var(--blue2);color:var(--text)}
.btn-primary:hover{background:#4a6bc7}
.btn-success{background:var(--green2);color:var(--green);border:1px solid #2d8a52}
.btn-success:hover{background:#1f7a42}
.btn-danger{background:#3a1a2a;color:var(--red);border:1px solid #6b2a3a}
.btn-warn{background:#2a2010;color:var(--yellow);border:1px solid #5a4a20}
.btn:disabled{opacity:.4;cursor:not-allowed}

#upload-zone{background:var(--bg3);border:1.5px dashed var(--border2);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:8px}
#upload-zone:hover,#upload-zone.drag{border-color:var(--blue)}
#upload-zone input{display:none}
#upload-zone .icon{font-size:22px;margin-bottom:4px}
#upload-zone .hint{font-size:11px;color:var(--text4)}
#upload-name{font-size:11px;color:var(--green);margin-top:4px;font-family:var(--mono)}

/* ── Metric cards ── */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px;flex-shrink:0}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.metric .label{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.metric .val{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--blue)}
.metric .val.g{color:var(--green)}.metric .val.y{color:var(--yellow)}.metric .val.r{color:var(--red)}

.suggest-box{background:var(--bg4);border:1px solid var(--blue2);border-radius:8px;padding:10px 14px;margin:0 12px 10px;font-family:var(--mono);font-size:12px;color:var(--teal);line-height:1.9}
.suggest-box b{color:var(--text2);font-weight:600}

/* ── Canvas areas ── */
#nest-canvas-wrap,#bridge-canvas-wrap{flex:1;overflow:hidden;position:relative;background:#000;margin:0 12px 12px}
canvas{display:block;width:100%;height:100%}

/* ── Bridge controls ── */
#bridge-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.bridge-btn{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
#bridge-status{font-size:12px;color:var(--teal);font-family:var(--mono);margin-left:auto}

/* ── Top3 ── */
#top3-row{display:flex;gap:6px;padding:8px 12px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border)}
.top3-card{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.top3-card canvas{display:block;width:100%;height:80px}
.top3-label{font-size:10px;color:var(--text3);text-align:center;padding:3px;font-family:var(--mono)}

/* ── DXF tab ── */
#dxf-panel{padding:16px}
.dxf-section{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.dxf-section h3{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.dxf-table{width:100%;border-collapse:collapse;font-size:13px}
.dxf-table td{padding:5px 8px;border-bottom:1px solid var(--border)}
.dxf-table td:first-child{color:var(--text3);width:45%}
.dxf-table td:last-child{font-family:var(--mono);color:var(--blue)}

#loading{position:fixed;inset:0;background:rgba(15,17,23,.85);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:12px}
#loading.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{font-size:13px;color:var(--text2)}
</style>
</head>
<body>

<div id="topbar">
  <h1>⬡ PCB Nesting Tool</h1>
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('nest')">📐 排版</button>
    <button class="tab-btn" onclick="switchTab('bridge')">🎨 橋接</button>
    <button class="tab-btn" onclick="switchTab('dxf')">📄 輸出</button>
  </div>
</div>

<div id="main">
  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sec-label">上傳零件</div>
    <div id="upload-zone" onclick="document.getElementById('dxf-file').click()"
         ondragover="e.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <input type="file" id="dxf-file" accept=".dxf" onchange="handleFileSelect(this)">
      <div class="icon">📁</div>
      <div class="hint">點擊或拖拽 .dxf 檔案</div>
      <div id="upload-name"></div>
    </div>

    <div class="sec-label">排版模式</div>
    <div class="field-single">
      <select id="mode">
        <option value="Nesting (嵌合模式)">Nesting（嵌合）</option>
        <option value="Matrix (矩形模式)">Matrix（矩形）</option>
      </select>
    </div>

    <div class="sec-label">面板規格 (mm)</div>
    <div class="field-single">
      <select id="preset" onchange="applyPreset()">
        <option value="custom">自定義</option>
        <option value="160x200">160 × 200</option>
        <option value="200x250">200 × 250</option>
      </select>
    </div>
    <div class="field-row">
      <div><label>寬 W</label><input type="number" id="pw" value="162.5" step="0.1"></div>
      <div><label>高 H</label><input type="number" id="ph" value="190.5" step="0.1"></div>
    </div>
    <div class="field-row">
      <div><label>圓角 R</label><input type="number" id="cr" value="4.0" step="0.5"></div>
    </div>

    <div class="sec-label">安全邊界 (mm)</div>
    <div class="field-row">
      <div><label>左</label><input type="number" id="ml" value="0" step="0.5"></div>
      <div><label>右</label><input type="number" id="mr" value="0" step="0.5"></div>
    </div>
    <div class="field-row">
      <div><label>上</label><input type="number" id="mt" value="2" step="0.5"></div>
      <div><label>下</label><input type="number" id="mb" value="2" step="0.5"></div>
    </div>

    <div class="sec-label">零件間距</div>
    <div class="field-single">
      <input type="range" id="spacing" min="0" max="20" step="0.5" value="2"
             oninput="document.getElementById('spacing-val').textContent=this.value+' mm'">
      <div class="range-val" id="spacing-val">2 mm</div>
    </div>

    <button class="btn btn-primary" id="run-btn" onclick="runNesting()" disabled>🚀 開始排版</button>
  </div>

  <!-- ── Content panels ── -->
  <div id="content">

    <!-- Nest panel -->
    <div id="panel-nest" class="panel active">
      <div id="top3-row" style="display:none">
        <div class="top3-card"><canvas id="c3-0"></canvas><div class="top3-label" id="l3-0">-</div></div>
        <div class="top3-card"><canvas id="c3-1"></canvas><div class="top3-label" id="l3-1">-</div></div>
        <div class="top3-card"><canvas id="c3-2"></canvas><div class="top3-label" id="l3-2">-</div></div>
      </div>
      <div class="metrics" id="metrics" style="display:none"></div>
      <div id="suggest-box" style="display:none"></div>
      <div id="nest-canvas-wrap"><canvas id="nest-canvas"></canvas></div>
    </div>

    <!-- Bridge panel -->
    <div id="panel-bridge" class="panel">
      <div id="bridge-bar">
        <button class="bridge-btn" style="background:#24283b;color:#bb9af7;border:1px solid #bb9af7"
                onclick="undoBridge()">↩️ 撤銷</button>
        <button class="bridge-btn" style="background:#24283b;color:#f7768e;border:1px solid #f7768e"
                onclick="resetBridge()">🔄 復原</button>
        <span id="bridge-status">提示：左鍵選兩條線段建立橋接 ｜ 滾輪縮放 ｜ 中鍵拖曳</span>
      </div>
      <div id="bridge-canvas-wrap"><canvas id="bridge-canvas"></canvas></div>
    </div>

    <!-- DXF panel -->
    <div id="panel-dxf" class="panel">
      <div id="dxf-panel">
        <div class="dxf-section">
          <h3>排版 DXF（零件位置 + 面板邊框）</h3>
          <button class="btn btn-success" onclick="downloadNest()">⬇️ 下載排版 DXF</button>
        </div>
        <div class="dxf-section">
          <h3>生產 DXF（含橋接弧線 + Offset 切斷）</h3>
          <button class="btn btn-success" onclick="downloadBridge()">⬇️ 下載最終生產 DXF</button>
        </div>
        <div class="dxf-section" id="stats-table" style="display:none">
          <h3>板子規格摘要</h3>
          <table class="dxf-table" id="spec-table"></table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="loading"><div class="spinner"></div><div id="loading-msg">計算中...</div></div>

<script>
// ── Tab switching ──
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['nest','bridge','dxf'][i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='bridge') bridgeZoomReset();
  if(name==='nest') nestZoomReset();
}

// ── Preset ──
function applyPreset(){
  const v=document.getElementById('preset').value;
  if(v==='160x200'){document.getElementById('pw').value=160;document.getElementById('ph').value=200;}
  else if(v==='200x250'){document.getElementById('pw').value=200;document.getElementById('ph').value=250;}
}

// ── File upload ──
let uploadedFile=null;
function handleFileSelect(input){if(input.files[0])doUpload(input.files[0]);}
function handleDrop(e){e.preventDefault();document.getElementById('upload-zone').classList.remove('drag');if(e.dataTransfer.files[0])doUpload(e.dataTransfer.files[0]);}
async function doUpload(file){
  uploadedFile=file;
  document.getElementById('upload-name').textContent=file.name;
  const fd=new FormData();fd.append('file',file);
  showLoading('讀取 DXF...');
  const r=await fetch('/upload',{method:'POST',body:fd});
  hideLoading();
  const d=await r.json();
  if(d.ok){
    document.getElementById('run-btn').disabled=false;
    document.getElementById('upload-name').textContent=`✅ ${file.name}  (${d.w}×${d.h}mm, ${d.holes}孔)`;
  } else {
    alert('讀取失敗：'+d.error);
  }
}

// ── Run nesting ──
async function runNesting(){
  showLoading('計算排版中...');
  const params={
    panel_w:+document.getElementById('pw').value,
    panel_h:+document.getElementById('ph').value,
    left:+document.getElementById('ml').value,
    right:+document.getElementById('mr').value,
    top:+document.getElementById('mt').value,
    bottom:+document.getElementById('mb').value,
    spacing:+document.getElementById('spacing').value,
    corner_r:+document.getElementById('cr').value,
    mode:document.getElementById('mode').value,
  };
  const r=await fetch('/nest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(params)});
  hideLoading();
  const d=await r.json();
  if(!d.ok){alert('排版失敗：'+d.error);return;}

  nestState.polys=d.polys;
  nestState.compW=d.compressed_w;
  nestState.compH=d.compressed_h;
  nestDrawAll();

  // Top3
  if(d.top3&&d.top3.length){
    document.getElementById('top3-row').style.display='flex';
    d.top3.forEach((t,i)=>drawTop3(i,t));
  }

  // Metrics
  renderMetrics(d.stats);
  renderSuggest(d.stats);

  // Bridge lines
  bridgeState.lines=d.lines;
  bridgeState.connectors=[];
  bridgeState.compW=d.compressed_w;
  bridgeState.compH=d.compressed_h;

  // Stats table
  renderStatsTable(d.stats);
}

// ─────────────────────────────────────────────
// NEST CANVAS
// ─────────────────────────────────────────────
const nestState={polys:[],compW:0,compH:0,scale:1,ox:0,oy:0,drag:false,lx:0,ly:0};

function nestZoomReset(){
  const c=document.getElementById('nest-canvas');
  const cw=c.clientWidth,ch=c.clientHeight;
  if(!nestState.compW||!nestState.compH)return;
  const s=Math.min((cw-40)/nestState.compW,(ch-40)/nestState.compH);
  nestState.scale=s;
  nestState.ox=(cw-nestState.compW*s)/2;
  nestState.oy=(ch+nestState.compH*s)/2;
  nestDrawAll();
}

function nestDrawAll(){
  const canvas=document.getElementById('nest-canvas');
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.clientWidth*dpr;
  canvas.height=canvas.clientHeight*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const cw=canvas.clientWidth,ch=canvas.clientHeight;
  const {scale:s,ox,oy,compW,compH}=nestState;
  if(!compW)return;
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle='#000';ctx.fillRect(0,0,cw,ch);

  function tx(x){return ox+x*s;}
  function ty(y){return oy-y*s;}

  // Panel frame
  ctx.strokeStyle='#7aa2f7';ctx.lineWidth=1.5;
  ctx.strokeRect(tx(0),ty(compH),compW*s,compH*s);

  // Parts
  nestState.polys.forEach(p=>{
    // exterior
    ctx.beginPath();
    p.exterior.forEach(([x,y],i)=>i===0?ctx.moveTo(tx(x),ty(y)):ctx.lineTo(tx(x),ty(y)));
    ctx.closePath();ctx.strokeStyle='#fff';ctx.lineWidth=.9;ctx.stroke();
    // holes
    p.holes.forEach(hole=>{
      ctx.beginPath();
      hole.forEach(([x,y],i)=>i===0?ctx.moveTo(tx(x),ty(y)):ctx.lineTo(tx(x),ty(y)));
      ctx.closePath();ctx.strokeStyle='#ff9e64';ctx.lineWidth=.7;ctx.stroke();
    });
  });

  // Corner holes
  [[4,4],[compW-4,4],[compW-4,compH-4],[4,compH-4]].forEach(([cx,cy])=>{
    ctx.beginPath();ctx.arc(tx(cx),ty(cy),1.53*s,0,Math.PI*2);
    ctx.strokeStyle='#7aa2f7';ctx.lineWidth=.8;ctx.stroke();
  });
}

// Nest canvas events
const nc=document.getElementById('nest-canvas');
nc.onwheel=e=>{
  e.preventDefault();
  const r=nc.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  const mx=(e.clientX-r.left),my=(e.clientY-r.top);
  const wx=(mx-nestState.ox)/nestState.scale,wy=(nestState.oy-my)/nestState.scale;
  const w=e.deltaY<0?1.15:.85;
  nestState.scale*=w;
  nestState.ox=mx-wx*nestState.scale;
  nestState.oy=my+wy*nestState.scale;
  nestDrawAll();
};
nc.onmousedown=e=>{if(e.button===1){nestState.drag=true;nestState.lx=e.clientX;nestState.ly=e.clientY;e.preventDefault();}};
window.addEventListener('mouseup',()=>{nestState.drag=false;bridgeState.drag=false;});
nc.onmousemove=e=>{
  if(nestState.drag){
    nestState.ox+=e.clientX-nestState.lx;nestState.oy+=e.clientY-nestState.ly;
    nestState.lx=e.clientX;nestState.ly=e.clientY;nestDrawAll();
  }
};
window.addEventListener('resize',()=>{nestDrawAll();bridgeDrawAll();});

// Top3 mini canvas
function drawTop3(i,t){
  const c=document.getElementById('c3-'+i);
  const ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  c.width=c.clientWidth*dpr;c.height=c.clientHeight*dpr;
  ctx.scale(dpr,dpr);
  const cw=c.clientWidth,ch=c.clientHeight;
  ctx.fillStyle='#1a1f2e';ctx.fillRect(0,0,cw,ch);
  const allPts=[...t.p1,...t.p2];
  const xs=allPts.map(p=>p[0]),ys=allPts.map(p=>p[1]);
  const minx=Math.min(...xs),miny=Math.min(...ys),maxx=Math.max(...xs),maxy=Math.max(...ys);
  const s=Math.min((cw-8)/(maxx-minx),(ch-8)/(maxy-miny));
  const ox=(cw-(maxx-minx)*s)/2;const oy=(ch+(maxy-miny)*s)/2;
  const tx=x=>ox+(x-minx)*s,ty=y=>oy-(y-miny)*s;
  const drawPoly=(pts,col)=>{ctx.beginPath();pts.forEach(([x,y],i)=>i===0?ctx.moveTo(tx(x),ty(y)):ctx.lineTo(tx(x),ty(y)));ctx.closePath();ctx.fillStyle=col;ctx.fill();};
  drawPoly(t.p1,'rgba(122,162,247,.8)');drawPoly(t.p2,'rgba(224,175,104,.8)');
  document.getElementById('l3-'+i).textContent=`#${i+1} ${t.pcs}PCS`;
}

// Metrics
function renderMetrics(s){
  const el=document.getElementById('metrics');
  el.style.display='grid';
  el.innerHTML=`
    <div class="metric"><div class="label">數量</div><div class="val">${s.pcs} PCS</div></div>
    <div class="metric"><div class="label">利用率</div><div class="val g">${s.utilization}%</div></div>
    <div class="metric"><div class="label">壓縮後尺寸</div><div class="val y" style="font-size:12px">${s.compressed_w}×${s.compressed_h}</div></div>
    <div class="metric"><div class="label">列×行</div><div class="val">${s.cols}×${s.rows}</div></div>
  `;
}
function renderSuggest(s){
  const el=document.getElementById('suggest-box');
  if(!s.suggest_w){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=`<div class="suggest-box">
    <b>目前：</b>${s.cur_cols} 列 × ${s.cur_rows} 行<br>
    <b>+1列</b> → W ≥ ${s.suggest_w} mm（+${s.extra_w} mm）<br>
    <b>+1行</b> → H ≥ ${s.suggest_h} mm（+${s.extra_h} mm）
  </div>`;
}
function renderStatsTable(s){
  document.getElementById('stats-table').style.display='block';
  document.getElementById('spec-table').innerHTML=`
    <tr><td>零件尺寸</td><td>${s.p_w} × ${s.p_h} mm</td></tr>
    <tr><td>壓縮後</td><td>${s.compressed_w} × ${s.compressed_h} mm</td></tr>
    <tr><td>縮減</td><td>${s.shrink_w} × ${s.shrink_h} mm</td></tr>
    <tr><td>間距 X/Y</td><td>${s.gap_x} / ${s.gap_y} mm</td></tr>
    <tr><td>邊緣餘裕 L/R</td><td>${s.band_l} / ${s.band_r} mm</td></tr>
    <tr><td>邊緣餘裕 T/B</td><td>${s.band_t} / ${s.band_b} mm</td></tr>
    ${s.suggest_w?`<tr><td>建議最小板寬</td><td>${s.suggest_w} mm (${s.suggest_cols}列)</td></tr>
    <tr><td>建議最小板高</td><td>${s.suggest_h} mm (${s.suggest_rows}行)</td></tr>`:''}
  `;
}

// ─────────────────────────────────────────────
// BRIDGE CANVAS
// ─────────────────────────────────────────────
const bridgeState={
  lines:[], connectors:[], compW:0, compH:0,
  scale:1, ox:0, oy:0, drag:false, lx:0, ly:0,
  hover:-1, selected:[], firstPt:null
};

const TYPE_COLOR={
  body:{n:'#ffffff',g:'#ffffff'},
  hole:{n:'#ff9e64',g:'#ff9e64'},
  offset:{n:'#2ac3de',g:'#2ac3de'},
};

function bridgeZoomReset(){
  const c=document.getElementById('bridge-canvas');
  const cw=c.clientWidth,ch=c.clientHeight;
  if(!bridgeState.compW)return;
  const s=Math.min((cw-40)/bridgeState.compW,(ch-40)/bridgeState.compH);
  bridgeState.scale=s;
  bridgeState.ox=(cw-bridgeState.compW*s)/2;
  bridgeState.oy=(ch+bridgeState.compH*s)/2;
  bridgeDrawAll();
}

function bridgeDrawAll(){
  const canvas=document.getElementById('bridge-canvas');
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.clientWidth*dpr;
  canvas.height=canvas.clientHeight*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const cw=canvas.clientWidth,ch=canvas.clientHeight;
  const {scale:s,ox,oy,lines,connectors,hover,selected,firstPt,compW,compH}=bridgeState;
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle='#000';ctx.fillRect(0,0,cw,ch);
  if(!compW)return;

  const tx=x=>ox+x*s, ty=y=>oy-y*s;
  const dw=Math.max(.5,Math.min(1.4/Math.pow(s/8,.4),2.5));

  lines.forEach((l,i)=>{
    const st=TYPE_COLOR[l.type]||TYPE_COLOR.body;
    const isS=selected.includes(i), isH=(i===hover);
    ctx.beginPath();
    ctx.moveTo(tx(l.coords[0][0]),ty(l.coords[0][1]));
    ctx.lineTo(tx(l.coords[1][0]),ty(l.coords[1][1]));
    if(isS){ctx.strokeStyle='#ff007c';ctx.lineWidth=dw*3;ctx.shadowBlur=0;}
    else if(isH){ctx.strokeStyle=st.n;ctx.lineWidth=dw*2.5;ctx.shadowBlur=8;ctx.shadowColor=st.g;}
    else{ctx.strokeStyle=st.n;ctx.lineWidth=(l.type==='offset')?dw*.8:dw;ctx.shadowBlur=0;}
    ctx.stroke();ctx.shadowBlur=0;
  });

  connectors.forEach(b=>{
    ctx.strokeStyle='#ffff00';ctx.lineWidth=dw*1.5;
    const rad=b.r*s, ar=b.ang*Math.PI/180;
    ctx.beginPath();ctx.arc(tx(b.lx),ty(b.ly),rad,-ar-Math.PI/2,-ar+Math.PI/2);ctx.stroke();
    ctx.beginPath();ctx.arc(tx(b.rx),ty(b.ry),rad,-ar+Math.PI/2,-ar+1.5*Math.PI);ctx.stroke();
  });

  ctx.strokeStyle='#2d3f76';ctx.lineWidth=1;ctx.setLineDash([8,4]);
  ctx.strokeRect(tx(0),ty(compH),compW*s,compH*s);ctx.setLineDash([]);

  if(firstPt){
    ctx.fillStyle='#ff007c';ctx.beginPath();
    ctx.arc(tx(firstPt.x),ty(firstPt.y),4,0,Math.PI*2);ctx.fill();
  }
}

// Bridge mouse helpers
const bc=document.getElementById('bridge-canvas');
function fromBX(cx){const r=bc.getBoundingClientRect();return(cx-r.left-bridgeState.ox)/bridgeState.scale;}
function fromBY(cy){const r=bc.getBoundingClientRect();return(bridgeState.oy-(cy-r.top))/bridgeState.scale;}

bc.addEventListener('contextmenu',e=>e.preventDefault());
bc.onwheel=e=>{
  e.preventDefault();
  const r=bc.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const wx=fromBX(e.clientX), wy=fromBY(e.clientY);
  const w=e.deltaY<0?1.15:.85;
  bridgeState.scale*=w;
  bridgeState.ox=mx-wx*bridgeState.scale;
  bridgeState.oy=my+wy*bridgeState.scale;
  bridgeDrawAll();
};
bc.onmousedown=e=>{
  if(e.button===1){bridgeState.drag=true;bridgeState.lx=e.clientX;bridgeState.ly=e.clientY;e.preventDefault();}
  else if(e.button===0&&bridgeState.hover!==-1){
    const rx=fromBX(e.clientX), ry=fromBY(e.clientY);
    if(bridgeState.selected.length===0){
      bridgeState.selected=[bridgeState.hover];
      bridgeState.firstPt={x:rx,y:ry};
      setStatus(`已選第一條線 (${bridgeState.lines[bridgeState.hover].type}) — 再選第二條`);
    } else {
      if(bridgeState.hover===bridgeState.selected[0]){
        bridgeState.selected=[];bridgeState.firstPt=null;setStatus('取消選取');
      } else {
        doBridge(bridgeState.selected[0],bridgeState.firstPt,bridgeState.hover);
        bridgeState.selected=[];bridgeState.firstPt=null;
      }
    }
    bridgeDrawAll();
  }
};
bc.onmousemove=e=>{
  const r=bc.getBoundingClientRect();
  const rx=fromBX(e.clientX),ry=fromBY(e.clientY);
  if(bridgeState.drag){
    bridgeState.ox+=e.clientX-bridgeState.lx;bridgeState.oy+=e.clientY-bridgeState.ly;
    bridgeState.lx=e.clientX;bridgeState.ly=e.clientY;bridgeDrawAll();return;
  }
  let lh=bridgeState.hover; bridgeState.hover=-1;
  let md=16/bridgeState.scale;
  bridgeState.lines.forEach((l,i)=>{
    const dx=l.coords[0][0]-l.coords[1][0],dy=l.coords[0][1]-l.coords[1][1],d2=dx*dx+dy*dy;
    let t=d2===0?0:Math.max(0,Math.min(1,((rx-l.coords[0][0])*(l.coords[1][0]-l.coords[0][0])+(ry-l.coords[0][1])*(l.coords[1][1]-l.coords[0][1]))/d2));
    const d=Math.sqrt((rx-(l.coords[0][0]+t*(l.coords[1][0]-l.coords[0][0])))**2+(ry-(l.coords[0][1]+t*(l.coords[1][1]-l.coords[0][1])))**2);
    if(d<md){md=d;bridgeState.hover=i;}
  });
  if(lh!==bridgeState.hover)bridgeDrawAll();
};

function setStatus(msg){document.getElementById('bridge-status').textContent=msg;}

async function doBridge(idx1,pt1,idx2){
  setStatus('計算橋接中...');
  const r=await fetch('/bridge',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({idx1,pt1:[pt1.x,pt1.y],idx2})});
  const d=await r.json();
  if(!d.ok){setStatus('❌ '+d.error);return;}
  bridgeState.lines=d.lines;
  bridgeState.connectors=d.connectors;
  setStatus(`✅ 橋接完成 (共 ${d.connectors.length} 個)`);
  bridgeDrawAll();
}

async function undoBridge(){
  const r=await fetch('/undo',{method:'POST'});
  const d=await r.json();
  if(d.ok){bridgeState.lines=d.lines;bridgeState.connectors=d.connectors;bridgeDrawAll();setStatus('已撤銷');}
}
async function resetBridge(){
  const r=await fetch('/reset_bridge',{method:'POST'});
  const d=await r.json();
  if(d.ok){bridgeState.lines=d.lines;bridgeState.connectors=[];bridgeDrawAll();setStatus('已復原全部');}
}

// ── Downloads ──
function downloadNest(){window.location='/download_nest_dxf';}
function downloadBridge(){window.location='/download_bridge_dxf';}

// ── Loading ──
function showLoading(msg){document.getElementById('loading-msg').textContent=msg;document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}

// Init
nestZoomReset();
</script>
